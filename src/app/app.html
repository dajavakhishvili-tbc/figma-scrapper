<!-- Header -->
<header class="border-b border-border bg-surface/50 px-6 py-3">
  <div class="max-w-7xl mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold text-text tracking-tight">Figma Text Diff</h1>
      <span class="text-xs text-text-dim bg-base px-2 py-0.5 rounded">v1.0</span>
    </div>
    <p class="text-xs text-text-dim">Compare Figma designs against live websites</p>
  </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-6 space-y-6">
  <!-- Two-panel input area -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <app-figma-panel (textExtracted)="onFigmaExtracted($event)" />
    <app-website-panel (textExtracted)="onWebsiteExtracted($event)" />
  </div>

  <!-- Compare button -->
  <div class="flex justify-center">
    <button
      (click)="compare()"
      [disabled]="!canCompare"
      class="bg-accent hover:bg-accent-hover disabled:opacity-40 disabled:cursor-not-allowed text-base font-semibold py-3 px-12 rounded-xl text-sm transition-all shadow-lg shadow-accent/20 hover:shadow-accent/30">
      Compare Text
    </button>
  </div>

  <!-- Results -->
  <app-results
    [figmaNodes]="figmaNodes()"
    [websiteNodes]="websiteNodes()"
    [trigger]="compareTrigger()" />
</main>
